<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Diagnóstico Elite | Raio-X do Negócio</title>
    <style>
        :root {
            --bg-black: #000000;
            --gold: #BF953F;
            --gold-grad: linear-gradient(135deg, #BF953F, #FCF6BA, #B38728);
            --border: rgba(255, 255, 255, 0.1);
            --text-main: #fff;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'SF Pro Display', -apple-system, sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg-black); color: var(--text-main); display: flex; align-items: center; justify-content: center; min-height: 100vh; overflow-x: hidden; }
        
        /* Efeito Fundo Imersivo */
        body::after {
            content: ''; position: fixed; width: 800px; height: 800px;
            background: radial-gradient(circle, rgba(191,149,63,0.08) 0%, transparent 60%);
            top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: -1; pointer-events: none;
        }

        .quiz-container { width: 100%; max-width: 850px; padding: 40px 20px; text-align: center; position: relative; z-index: 1; margin: auto; }
        
        .progress-wrapper { display: flex; align-items: center; justify-content: space-between; margin-bottom: 40px; }
        .progress-text { color: var(--gold); font-weight: 700; font-size: 0.9rem; letter-spacing: 2px; }
        .progress-bar-bg { flex-grow: 1; height: 6px; background: #222; border-radius: 10px; margin-left: 15px; overflow: hidden; position: relative; }
        .progress-bar-fill { height: 100%; background: var(--gold-grad); width: 0%; transition: width 0.6s cubic-bezier(0.2, 0.8, 0.2, 1); box-shadow: 0 0 10px var(--gold); }

        .step-container { display: none; opacity: 0; transform: scale(0.98); transition: 0.5s ease; }
        .step-container.active { display: block; opacity: 1; transform: scale(1); animation: slideUp 0.5s ease forwards; }

        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        h2 { font-size: clamp(1.6rem, 4vw, 2.5rem); font-weight: 800; margin-bottom: 15px; line-height: 1.3; }
        p.subtitle { color: #aaa; font-size: 1.1rem; margin-bottom: 35px; line-height: 1.5; }

        .options-grid { display: grid; gap: 12px; grid-template-columns: 1fr; }
        @media(min-width: 768px) { .options-grid.duplo { grid-template-columns: 1fr 1fr; } }
        
        .option-btn {
            background: rgba(20,20,20,0.8); border: 1px solid var(--border); color: #ddd;
            padding: 20px 25px; border-radius: 15px; font-size: 1.05rem; font-weight: 500; cursor: pointer;
            transition: all 0.3s; display: flex; justify-content: space-between; align-items: center; text-align: left;
            backdrop-filter: blur(10px); line-height: 1.4;
        }
        .option-btn:hover { background: rgba(191, 149, 63, 0.1); border-color: var(--gold); color: #fff; transform: translateY(-3px); box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        .option-btn::after { content: '✦'; opacity: 0; transition: 0.3s; color: var(--gold); font-size: 1.2rem; margin-left: 10px; }
        .option-btn:hover::after { opacity: 1; }

        input { width: 100%; background: #111; border: 1px solid #333; color: #fff; padding: 25px; border-radius: 15px; font-size: 1.2rem; margin-bottom: 20px; outline: none; text-align: center; transition: 0.3s; }
        input:focus { border-color: var(--gold); box-shadow: 0 0 20px rgba(191,149,63,0.2); }

        .btn-submit { background: var(--gold-grad); color: #000; width: 100%; padding: 22px; border-radius: 15px; border: none; font-size: 1.2rem; font-weight: 800; text-transform: uppercase; cursor: pointer; transition: 0.3s; letter-spacing: 1px;}
        .btn-submit:hover { transform: translateY(-3px); box-shadow: 0 10px 30px rgba(191,149,63,0.4); }

        /* Loader Imersivo */
        .loader-ui { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 350px; }
        .radar { width: 70px; height: 70px; border: 2px solid rgba(191,149,63,0.3); border-radius: 50%; border-top-color: var(--gold); animation: spin 0.8s linear infinite; margin-bottom: 25px; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        .typing-text { color: #fff; font-size: 1.1rem; font-weight: bold; letter-spacing: 3px; }

    </style>
</head>
<body>

    <div class="quiz-container">
        <div class="progress-wrapper">
            <span class="progress-text" id="step-counter">01/10</span>
            <div class="progress-bar-bg"><div class="progress-bar-fill" id="progress"></div></div>
        </div>
        <div id="quiz-content"></div>
    </div>

    <script>
        const SEU_WHATSAPP = "5511999999999"; // INSIRA SEU NUMERO AQUI

        // O Raio-X de 10 Passos Estratégicos
        const quizSteps = [
            {
                id: "q1",
                title: "Qual o momento atual do seu faturamento?",
                subtitle: "Nós atendemos de pequenos negócios a grandes operações. Seja transparente.",
                options: [
                    { text: "Iniciando / Até R$ 15.000,00 mensais", score: 1 },
                    { text: "Tracionando: R$ 15k a R$ 50k mensais", score: 3 },
                    { text: "Escalando: R$ 50k a R$ 200k mensais", score: 5 },
                    { text: "Operação Elite: Mais de R$ 200k mensais", score: 8 }
                ]
            },
            {
                id: "q2",
                title: "Qual é o objetivo mais URGENTE da sua empresa hoje?",
                subtitle: "O que faria você dizer que nosso trabalho foi um sucesso absoluto?",
                options: [
                    { text: "Preciso de LEADS urgentes para vender amanhã", score: 3 },
                    { text: "Quero me posicionar como uma marca Premium/Luxo", score: 5 },
                    { text: "Preciso de criativos e vídeos profissionais que convertam", score: 4 },
                    { text: "Quero terceirizar tudo: Tráfego, Design e Audiovisual", score: 6 }
                ]
            },
            {
                id: "q3",
                title: "Olhando para o seu Marketing, onde está o maior gargalo?",
                subtitle: "Todo negócio tem uma trava. Qual é a sua?",
                options: [
                    { text: "Ninguém conhece minha marca (Falta de Visibilidade)", score: 2 },
                    { text: "Chega muita gente, mas são leads desqualificados/sem dinheiro", score: 4 },
                    { text: "Minhas redes sociais e vídeos parecem amadores", score: 4 },
                    { text: "Não tenho braço/tempo para cuidar do marketing", score: 5 }
                ]
            },
            {
                id: "q4",
                title: "Como está a qualidade Audiovisual e de Imagem da sua marca?",
                subtitle: "A percepção visual define o preço que você pode cobrar.",
                options: [
                    { text: "Uso fotos do celular e banco de imagens", score: 1 },
                    { text: "Tenho vídeos caseiros, mas não geram autoridade", score: 2 },
                    { text: "Preciso de captação cinematográfica de alta qualidade", score: 6 },
                    { text: "Quero dominar Reels/TikTok com edições dinâmicas", score: 5 }
                ]
            },
            {
                id: "q5",
                title: "Sobre Tráfego Pago (Anúncios Patrocinados):",
                subtitle: "Como você gerencia o investimento nas plataformas (Meta/Google)?",
                options: [
                    { text: "Não faço, só uso o botão 'Turbinar' do Instagram", score: 1 },
                    { text: "Eu mesmo tento fazer as campanhas, mas perco dinheiro", score: 2 },
                    { text: "Tenho agência/gestor, mas o resultado estagnou", score: 4 },
                    { text: "Invisto alto, tenho ROAS positivo e quero ESCALAR", score: 6 }
                ]
            },
            {
                id: "q6",
                title: "Como funciona o seu fechamento de vendas?",
                subtitle: "De nada adianta o lead chegar se o balde estiver furado.",
                options: [
                    { text: "Venda automática (E-commerce / Site)", score: 4 },
                    { text: "Eu mesmo atendo um por um no WhatsApp", score: 2 },
                    { text: "Tenho uma equipe Comercial / Closers treinados", score: 6 },
                    { text: "Atendimento presencial em Loja/Clínica", score: 4 }
                ]
            },
            {
                id: "q7",
                title: "Qual o Ticket Médio do que você vende?",
                subtitle: "Isso define a agressividade do funil que vamos desenhar.",
                options: [
                    { text: "Produto de Entrada (Até R$ 200)", score: 2 },
                    { text: "Mid-Ticket (De R$ 200 a R$ 1.500)", score: 4 },
                    { text: "High-Ticket (De R$ 1.500 a R$ 5.000)", score: 6 },
                    { text: "Consultoria/Serviços Premium (+ R$ 5.000)", score: 8 }
                ]
            },
            {
                id: "q8",
                title: "Nossa operação exige inteligência e estrutura.",
                subtitle: "Qual sua disponibilidade de orçamento MENSAL para investir no crescimento da empresa?",
                options: [
                    { text: "Até R$ 1.500 (Buscando o básico para começar)", score: 1 },
                    { text: "De R$ 1.500 a R$ 4.000 (Pronto para estruturar)", score: 4 },
                    { text: "De R$ 4.000 a R$ 10.000 (Foco em tração e vídeos)", score: 6 },
                    { text: "Acima de R$ 10.000 (Orçamento para dominar o setor)", score: 10 }
                ]
            },
            {
                id: "q9",
                title: "Qual o seu nível de urgência para resolver isso?",
                subtitle: "Nossa agenda de captação audiovisual e setup é disputada.",
                options: [
                    { text: "Estou apenas pesquisando mercado", score: 1 },
                    { text: "Quero me estruturar para os próximos 30 a 60 dias", score: 3 },
                    { text: "Urgência máxima. Estou deixando dinheiro na mesa hoje", score: 6 }
                ]
            },
            {
                id: "q10",
                title: "Diagnóstico Computado com Sucesso.",
                subtitle: "Para quem o Diretor da Agência Elite deve direcionar este dossiê estratégico?",
                isInput: true
            }
        ];

        let currentIndex = 0;
        let totalScore = 0;
        let userResponses = [];
        const container = document.getElementById('quiz-content');
        const progressBar = document.getElementById('progress');
        const stepCounter = document.getElementById('step-counter');

        function renderCurrentStep() {
            const step = quizSteps[currentIndex];
            const progressPercent = ((currentIndex) / quizSteps.length) * 100;
            
            progressBar.style.width = progressPercent + '%';
            stepCounter.innerText = `0${currentIndex + 1}/10`.slice(-5); // Formata para 01/10, 02/10 etc

            let html = '';
            
            if (step.isInput) {
                progressBar.style.width = '100%';
                html = `
                    <div class="step-container active">
                        <h2>${step.title}</h2>
                        <p class="subtitle">${step.subtitle}</p>
                        <input type="text" id="leadName" placeholder="Seu Nome e Empresa (Ex: Carlos - Imobiliária X)" autocomplete="off">
                        <button class="btn-submit" onclick="finishFunnel()">Enviar para Análise Executiva</button>
                    </div>
                `;
            } else {
                // Adiciona classe 'duplo' na grid se as opções forem curtas ou houver muitas opções
                const isDuplo = step.options.length > 3 ? 'duplo' : '';
                
                const optionsHtml = step.options.map((opt, i) => `
                    <button class="option-btn" onclick="handleSelect(${i})">${opt.text}</button>
                `).join('');

                html = `
                    <div class="step-container active">
                        <h2>${step.title}</h2>
                        <p class="subtitle">${step.subtitle}</p>
                        <div class="options-grid ${isDuplo}">${optionsHtml}</div>
                    </div>
                `;
            }
            container.innerHTML = html;
        }

        function handleSelect(optIndex) {
            const step = quizSteps[currentIndex];
            const selected = step.options[optIndex];
            
            userResponses.push(`📌 *${step.title}*\n👉 ${selected.text}`);
            totalScore += selected.score;

            // Transição imersiva simulando processamento de dados (Dura 700ms)
            container.innerHTML = `
                <div class="loader-ui">
                    <div class="radar"></div>
                    <div class="typing-text">CRUZANDO DADOS...</div>
                </div>
            `;

            setTimeout(() => {
                currentIndex++;
                renderCurrentStep();
            }, 700);
        }

        function finishFunnel() {
            const name = document.getElementById('leadName').value.trim();
            if(!name) { alert("Por favor, preencha seu nome e o da sua empresa para finalizarmos."); return; }

            // Lógica de "Scoring" Refinada do Lead (Pontuação Máxima: ~65)
            let perfil = "⚠️ INICIANTE / BAIXO ORÇAMENTO (Necessita serviços de entrada)";
            if(totalScore > 18 && totalScore <= 35) perfil = "🔥 EMPRESA EM CRESCIMENTO (Bom potencial para Tráfego/Conteúdo)";
            if(totalScore > 35 && totalScore <= 48) perfil = "🚀 OPERAÇÃO MADURA (Ideal para Escala e Captação Audiovisual)";
            if(totalScore > 48) perfil = "💎 ELITE HIGH-TICKET (Prioridade Absoluta. Orçamento Alto)";

            let msg = `*NOVO DIAGNÓSTICO DE 10 PASSOS - SITE ELITE* 🎯\n\n`;
            msg += `*Lead:* ${name}\n`;
            msg += `*Classificação da IA:* ${perfil}\n`;
            msg += `*Pontuação Estratégica:* ${totalScore} pontos\n\n`;
            msg += `*--- MAPA COMPLETO DO NEGÓCIO ---*\n\n`;
            msg += userResponses.join('\n\n');
            msg += `\n\n*Aguardando abordagem executiva via WhatsApp.*`;

            const link = `https://wa.me/${SEU_WHATSAPP}?text=${encodeURIComponent(msg)}`;

            container.innerHTML = `
                <div class="loader-ui">
                    <div class="radar" style="border-color:#0f0; border-top-color:#0f0;"></div>
                    <div class="typing-text" style="color:#0f0;">DOSSIÊ ENVIADO. ABRINDO CONEXÃO...</div>
                </div>
            `;

            setTimeout(() => window.location.href = link, 1500);
        }

        // Iniciar
        renderCurrentStep();
    </script>
</body>
</html>
