<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agência Digital | High-Tech</title>
    <style>
        /* Variáveis de Cores: Dourado e Prata Tecnológicos */
        :root {
            --gold-gradient: linear-gradient(135deg, #BF953F, #FCF6BA, #B38728, #FBF5B7);
            --silver-gradient: linear-gradient(135deg, #757F9A, #D7DDE8, #757F9A);
            --bg-dark: #050505;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: #fff;
            overflow-x: hidden;
        }

        /* Fundo de Vídeo Imersivo */
        .video-background {
            position: fixed;
            right: 0;
            bottom: 0;
            min-width: 100%;
            min-height: 100%;
            z-index: -1;
            opacity: 0.4; /* Deixa escuro para destacar o dourado/prata */
            background: radial-gradient(circle, #1a1a1a 0%, #000000 100%);
        }

        /* Cabeçalho Glassmorphism */
        header {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 20px 50px;
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 900;
            background: var(--gold-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* Seção Principal (Hero) */
        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 0 20px;
        }

        .hero h1 {
            font-size: 5rem;
            font-weight: 900;
            margin-bottom: 20px;
            background: var(--silver-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: glow 3s infinite alternate;
        }

        .hero p {
            font-size: 1.5rem;
            color: #aaa;
            max-width: 800px;
            margin-bottom: 40px;
            line-height: 1.6;
        }

        /* Botão Tecnológico */
        .btn-tech {
            padding: 15px 40px;
            font-size: 1.2rem;
            font-weight: bold;
            color: #000;
            background: var(--gold-gradient);
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 0 20px rgba(191, 149, 63, 0.5);
        }

        .btn-tech:hover {
            transform: scale(1.05);
            box-shadow: 0 0 40px rgba(252, 246, 186, 0.8);
        }

        /* Animações */
        @keyframes glow {
            0% { text-shadow: 0 0 10px rgba(215, 221, 232, 0.2); }
            100% { text-shadow: 0 0 30px rgba(215, 221, 232, 0.6); }
        }

        /* Partículas em Movimento (JS) */
        #particles {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <video autoplay muted loop class="video-background">
        </video>

    <canvas id="particles"></canvas>

    <header>
        <div class="logo">Sua Agência</div>
    </header>

    <section class="hero">
        <h1>O FUTURO DO MARKETING</h1>
        <p>Experiências visuais imersivas, tecnologia de ponta e resultados que redefinem o mercado digital.</p>
        <button class="btn-tech">Inicie a Transformação</button>
    </section>

    <script>
        // Lógica para partículas flutuantes sutis no fundo
        const canvas = document.getElementById('particles');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const particlesArray = [];
        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2;
                this.speedX = Math.random() * 1 - 0.5;
                this.speedY = Math.random() * 1 - 0.5;
                // Cores misturadas entre Dourado e Prata
                this.color = Math.random() > 0.5 ? '#BF953F' : '#D7DDE8'; 
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                if (this.size > 0.2) this.size -= 0.01;
            }
            draw() {
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function init() {
            for (let i = 0; i < 100; i++) {
                particlesArray.push(new Particle());
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let i = 0; i < particlesArray.length; i++) {
                particlesArray[i].update();
                particlesArray[i].draw();
            }
            requestAnimationFrame(animate);
        }

        init();
        animate();
    </script>
</body>
</html>
